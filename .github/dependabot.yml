# Dependabot v2 — automatic dependency update + CVE alerts.
# Doc: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Phase 13 Tier-A++ tooling — see `docs/tooling-recommendations.md`.

version: 2
updates:
  # Swift Package Manager — all package manifests in repo.
  # BBTB.xcodeproj + Tools/SocksProbe + 15 packages в BBTB/Packages/.

  - package-ecosystem: "swift"
    directory: "/BBTB"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "swift"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Critical / high security updates always processed; minor groups batched.
    groups:
      swift-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — workflow updates (CodeQL, etc.).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Tools/SocksProbe — separate SwiftPM workspace.
  - package-ecosystem: "swift"
    directory: "/BBTB/Tools/SocksProbe"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "tools"
