# CodeQL — semantic SAST для Swift codebase.
# Doc: https://github.com/github/codeql-action
#
# Free for public repos. Detects:
# - Injection paths (untrusted input -> sensitive sink)
# - Cryptographic API misuse
# - Path traversal patterns
# - Hardcoded secrets
# - Common Swift security antipatterns
#
# Runs on every push, every PR, и weekly scheduled scan.
#
# Build mode: AUTOBUILD. Swift CodeQL extractor does NOT support `none`
# mode (verified в run 25991112981 error: "Swift does not support the
# none build mode"). Autobuild calls `swift build` per detected SwiftPM
# package; per-package builds tolerate missing libbox (PacketTunnelKit
# тогда не build'ится, остальные packages indexed).
#
# SECURITY: workflow consumes only controlled inputs (matrix, github.ref).
# No untrusted user input (PR title/body/head_ref) in run: commands.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC weekly

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["swift"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: autobuild
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true  # PacketTunnelKit needs libbox; tolerated

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
