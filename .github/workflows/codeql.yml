# CodeQL — semantic SAST для Swift codebase.
# Doc: https://github.com/github/codeql-action
#
# Free for public repos. Detects:
# - Injection paths (untrusted input -> sensitive sink)
# - Cryptographic API misuse
# - Path traversal patterns
# - Hardcoded secrets
# - Common Swift security antipatterns
#
# Runs on every push, every PR, и weekly scheduled scan.
#
# Build mode: NONE (source-only analysis). Avoids dependency on
# libbox.xcframework which is built externally via gomobile + not committed
# to repo. Source-only mode loses some dataflow precision (cross-module
# inter-procedural) но catches most security antipatterns reliably.
#
# SECURITY: workflow consumes only controlled inputs (matrix, github.ref).
# No untrusted user input (PR title/body/head_ref) in run: commands.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Monday 03:00 UTC weekly

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["swift"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none  # source-only — no libbox.xcframework dependency
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
