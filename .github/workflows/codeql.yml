# CodeQL — semantic SAST for Swift codebase.
# Doc: https://github.com/github/codeql-action
#
# Free for public repos. Builds dataflow graph и detects:
# - Injection paths (untrusted input -> sensitive sink)
# - Cryptographic API misuse
# - Path traversal patterns
# - Hardcoded secrets
# - Many common Swift security antipatterns
#
# Runs on every push, PR, и weekly scheduled scan.
#
# SECURITY NOTE: This workflow does NOT consume any untrusted user input
# (github.event.issue.*, github.event.pull_request.title, github.head_ref,
# etc.) in run: commands. Only static config (matrix, branch refs) is used.
# No injection surface.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 03:00 UTC — catches new CVE/rule additions.
    - cron: "0 3 * * 1"

# Cancel in-progress runs on new push к same branch.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-15  # latest Xcode 16+ для Swift 6 support
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write  # required для uploading SARIF results

    strategy:
      fail-fast: false
      matrix:
        language: ["swift"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Build BBTB
        run: |
          cd BBTB
          xcodebuild \
            -scheme BBTB \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
